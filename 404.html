<svg id="volt-svg-defs" xmlns="http://www.w3.org/2000/svg" style="position:absolute;width:0;height:0;overflow:hidden" aria-hidden="true" focusable="false">
  <defs>
    <filter id="volt-crackle" x="-30%" y="-30%" width="160%" height="160%">
      <feTurbulence type="turbulence" baseFrequency="0.035 0.85"
                    numOctaves="4" seed="3" result="n">
        <animate attributeName="baseFrequency"
                 values="0.035 0.85;0.035 0.85;0.035 0.85;0.035 0.85;0.11 2.4;0.18 3.2;0.09 1.8;0.035 0.85;0.035 0.85"
                 dur="4s" repeatCount="indefinite"/>
        <animate attributeName="seed"
                 values="3;3;3;3;8;14;6;3;3"
                 dur="4s" repeatCount="indefinite"/>
      </feTurbulence>
      <feDisplacementMap in="SourceGraphic" in2="n"
                         xChannelSelector="R" yChannelSelector="G">
        <animate attributeName="scale"
                 values="1;1;1;1;18;28;12;2;1"
                 dur="4s" repeatCount="indefinite"/>
      </feDisplacementMap>
    </filter>
  </defs>
</svg>
